# ── iota shared services ──────────────────────────────────────────────────────
# One MySQL instance shared across all sites. Each site gets its own database
# and user. Add future shared services (S3, Mailpit, Redis, etc.) here.

services:
  mysql:
    image: mysql:8.0
    container_name: iota_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: iota_root_secret
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    networks:
      - iota_services
    labels:
      iota.service: mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-piota_root_secret"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  traefik:
    image: traefik:v3
    container_name: iota_traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.network=iota_services"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--ping=true"
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik:/etc/traefik/dynamic:ro
      - ../sites:/sites:ro
    networks:
      - iota_services
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      iota.service: traefik

